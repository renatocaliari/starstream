[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    asyncio: marks tests as async (built-in with pytest-asyncio)
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: marks tests as end-to-end
